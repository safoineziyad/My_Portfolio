<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1209;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c1e10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8956c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c49a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Coffee cup icon -->
  <g transform="translate(340, 140)" opacity="0.15">
    <path d="M0 0 h120 v100 q0 40 -60 40 q-60 0 -60 -40 z" fill="#c8956c" stroke="none"/>
    <path d="M120 20 h30 q20 0 20 30 v20 q0 30 -20 30 h-30" fill="none" stroke="#c8956c" stroke-width="8"/>
    <ellipse cx="60" cy="10" rx="65" ry="12" fill="#c8956c" opacity="0.5"/>
    <!-- Steam -->
    <path d="M30 -20 Q35 -40 30 -55 Q25 -70 30 -85" fill="none" stroke="#c8956c" stroke-width="4" opacity="0.6"/>
    <path d="M60 -15 Q65 -35 60 -50 Q55 -65 60 -80" fill="none" stroke="#c8956c" stroke-width="4" opacity="0.4"/>
    <path d="M90 -20 Q95 -40 90 -55 Q85 -70 90 -85" fill="none" stroke="#c8956c" stroke-width="4" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="400" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="url(#accent)">Cafe NOMAD</text>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#c8956c" opacity="0.6" letter-spacing="6">FULL-STACK COFFEE SHOP</text>
  <!-- Decorative line -->
  <line x1="300" y1="385" x2="500" y2="385" stroke="#c8956c" stroke-width="1" opacity="0.3"/>
</svg>
