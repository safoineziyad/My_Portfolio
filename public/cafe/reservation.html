<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation - Café NOMAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/cafe/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo"><span>N</span> Café NOMAD</div>
        <button class="hamburger" id="hamburger">&#9776;</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="/cafe/">Home</a></li>
            <li><a href="/cafe/menu.html">Menu</a></li>
            <li><a href="/cafe/reservation.html">Reserve</a></li>
            <li><a href="/cafe/status.html">Status</a></li>
            <li><a href="/cafe/contact.html">Contact</a></li>
            <li><a href="/cafe/admin/login.html">Staff</a></li>
        </ul>
    </nav>

    <section class="section form-section" style="margin-top: 80px;">
        <h2 class="section-title reveal">Book a Table</h2>
        <p class="section-subtitle reveal">Secure your spot at Café NOMAD</p>
        
        <div class="form-container reveal">
            <div id="formMessage"></div>
            <form id="reservationForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" name="phone" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" class="form-control" name="date" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" class="form-control" name="time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Guests</label>
                    <input type="number" class="form-control" name="guests" min="1" value="2" required>
                </div>
                <div class="form-group">
                    <label>Special Requests</label>
                    <textarea class="form-control" name="specialRequests" rows="3"></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Request</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Cafe NOMAD. Made with &#10084;&#65039; by Ziyad.</p>
    </footer>

    <script src="/cafe/js/cart.js"></script>
    <script src="/cafe/js/main.js"></script>
</body>
</html>
